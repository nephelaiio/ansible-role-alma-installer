---
name: molecule
on:
  pull_request:
    branches:
      - master
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  libvirt:
    name: libvirt
    runs-on: libvirt
    strategy:
      matrix:
        scenario:
          - "default"
        mirror:
          - ""
          - "https://repo.almalinux.org/almalinux/10"
        partition_size:
          - 10
          - 50
        partition_method:
          - "lvm"
          - "static"
        distro:
          - name: "almalinux10"
            image: "https://repo.almalinux.org/almalinux/10/isos/x86_64/AlmaLinux-10.1-x86_64-dvd.iso"
    env:
      MOLECULE_LOGDIR: "/tmp/logs"
    steps:
      - name: Run devbox tests
        uses: pokerops/ansible-utils@master
        with:
          run: |
            make requirements test -s ${{ matrix.scenario }}\
              MOLECULE_LOGDIR=${{ env.MOLECULE_LOGDIR }} \
              MOLECULE_DISTRO=${{ matrix.distro.name }} \
              MOLECULE_ISO=${{ matrix.distro.image }} \
              MOLECULE_PARTITION_METHOD=${{ matrix.partition_method }} \
              MOLECULE_PARTITION_SIZE=${{ matrix.partition_size }} \
              ALMA_BASEURL=${{ matrix.mirror }}

      - name: Upload install logs
        uses: actions/upload-artifact@v4
        with:
          name: install.${{ matrix.scenario }}.${{ matrix.distro.name }}
          path: |
            ${{ env.MOLECULE_LOGDIR }}/*.log
            ${{ env.MOLECULE_LOGDIR }}/*.png
          if-no-files-found: ignore
        if: always()
